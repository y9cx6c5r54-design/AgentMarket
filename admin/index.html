<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AgentMarket Admin Login</title>
  <style>
    body{font-family:Inter,system-ui,Arial,sans-serif;background:#0b1020;color:#e8ecff;display:grid;place-items:center;min-height:100vh;margin:0}
    .card{width:min(420px,92vw);background:#121a33;border:1px solid #263056;border-radius:14px;padding:22px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
    h1{margin:0 0 8px;font-size:22px} p{margin:0 0 18px;color:#aab6e6}
    label{display:block;margin:10px 0 6px;font-size:13px;color:#c8d1f7}
    input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #33406f;background:#0d1430;color:#fff;box-sizing:border-box}
    button{margin-top:14px;width:100%;padding:11px;border:0;border-radius:10px;background:#6d7cff;color:#fff;font-weight:600;cursor:pointer}
    .msg{margin-top:12px;font-size:13px;min-height:18px}
    .ok{color:#74f0a7}.err{color:#ff8b8b}
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin Login</h1>
    <p>Sign in to AgentMarket backend.</p>
    <label>Email</label>
    <input id="email" type="email" placeholder="admin@agentmarketnow.com" />
    <label>Password</label>
    <input id="password" type="password" placeholder="••••••••" />
    <button id="loginBtn">Login</button>
    <div id="msg" class="msg"></div>
  </div>

  <script>
    const msg = document.getElementById('msg');
    const btn = document.getElementById('loginBtn');

    function setMsg(text, ok=false){
      msg.textContent = text;
      msg.className = 'msg ' + (ok ? 'ok':'err');
    }

    btn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      setMsg('');
      if(!email || !password) return setMsg('Enter email and password');
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const r = await fetch('/api/auth/login', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({email, password})
        });
        const data = await r.json();
        if(!r.ok || !data.token) {
          throw new Error(data.error || 'Login failed');
        }
        localStorage.setItem('agentmarket_token', data.token);
        localStorage.setItem('agentmarket_user', JSON.stringify(data.user || {}));
        setMsg('Login successful. Redirecting...', true);
        setTimeout(()=>location.href='/admin/dashboard', 400);
      } catch (e) {
        setMsg(e.message || 'Login failed');
      } finally {
        btn.disabled = false; btn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
